title: "Käkisalmen lääni ja Inkeri – läänintilit 1637–1648 (julkaisematon)"
description: "Muistiinpanot ja transkriptiot Käkisalmen läänin ja Inkerinmaan läänintileistä vuosilta 1637–1648. Sisältää maakirjoja, arvioveroluetteloita ja kylätietoja Karjalasta: Pyh\u00e4j\u00e4rvi, Sakkula, Rautus, Suoj\u00e4rvi, Ilomants, Libelits, Tohmaj\u00e4rvi, Suistamo, Sortavala, Salmis, Tiurala, Kurkijoki, Joukio, Uguniemi, Kides, Pielisjärvi. Raaka-aineisto Viipurin läänintilit -kirjalle."
