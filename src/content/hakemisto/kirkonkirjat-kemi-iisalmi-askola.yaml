title: "Kirkonkirjat – Kemi, Iisalmi, Askola, Kiukainen (julkaisematon)"
description: "Muistiinpanoja ja transkriptioita useiden seurakuntien rippikirjoista, haudattujen luetteloista ja muista kirkonkirjoista. Kattaa mm. Kemin 1709–1741, Iisalmen haudatut 1732–1749, Askolan rippikirjat 1740–1786 sekä Kiukaisten rippikirjat 1740–1771."
reference:
  type: unpublished
  label: "Julkaisematon tutkimusaineisto"
  note: "Ota yhteyttä saadaksesi lisätietoja tästä aineistosta."
