title: "Ruoveden kirkonkirjat – syntyneet, vihityt ja haudatut (julkaisematon)"
description: "Transkriptiot Ruoveden seurakunnan syntyneiden, vihittyjen ja haudattujen luetteloista 1700-luvulta. Kattaa Ruoveden emäseurakunnasta myöhemmin lohkaistut pitäjät: Virtain, Keuruun, Teiskon, Oriveden ja Kuoreveden alueet."
