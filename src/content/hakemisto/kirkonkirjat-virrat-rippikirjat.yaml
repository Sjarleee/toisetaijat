title: "Virtain rippikirjatranskriptiot 1775–1833"
description: "Matti J. Kankaanpään laatimat transkriptiot Virtain seurakunnan rippikirjoista jaksoilta 1775–1787, 1798–1804, 1810–1817 ja 1825–1833. Sisältää kaikki Virtain kylien taloudet talonhaltijoineen, puolisoineen ja lapsineen."
