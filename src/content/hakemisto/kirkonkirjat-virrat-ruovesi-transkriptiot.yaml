title: "Virtain ja Ruoveden kirkonkirjatranskriptiot (julkaisematon)"
description: "Laajat transkriptiot Virtain ja Ruoveden seurakunnan rippikirjoista, syntyneiden, haudattujen ja vihittyjen luetteloista sekä muuttokirjoista 1600–1800-luvuilta. Ei julkaistu, ota yhteyttä lisätietoja varten."
