title: "Pohjanmaan voudintilitdokumentit ja henkikirjat (julkaisematon)"
description: "Muistiinpanot Pohjanmaan voudintileistä ja henkikirjoista 1600–1700-luvuilta. Sisältää kylätietoja Sotkamosta, Paltamosta, Lapualta, Ilmajoelta, Isosta-Kyrö\u00e4st\u00e4 ja rannikkoalueilta. Paljon torppareita, inhysareita ja sotilaita nimilistatiedoilla."
