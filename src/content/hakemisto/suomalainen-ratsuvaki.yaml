title: "Suomalainen ratsuväki Ruotsin ajalla"
description: "Ensimmäinen kokonaisteos suomalaisesta ratsuväestä n. 1550–1809. Kirja sisältää laajan henkilöhakemiston ratsuväen upseereista, rusthollareista ja ratsumiehistä kotipitäjineen. 790 sivua."
