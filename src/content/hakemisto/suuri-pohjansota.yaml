title: "Suuri Pohjansota, Iso Viha ja suomalaiset"
description: "Pohjan sota oli Suomen historian merkittävin murroskausi 1700-luvun alussa. Kirja kuvaa sodan ja Isoviha-miehityksen (1713–1721) vaikutuksia suomalaisten arjessa — sekä sotilaiden että siviilien kokemuksista. 464 sivua."
