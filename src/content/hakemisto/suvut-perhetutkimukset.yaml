title: "Perhesukututkimukset – SUVUT-kokoelma (julkaisematon)"
description: "Matti J. Kankaanpään yli 200 tilaustyönä tai yhteistyönä laaditua perhesukututkimusta. Kattaa satoja sukuja eri puolilta Suomea, pääasiassa Hämeestä, Satakunnasta, Karjalasta ja Pohjanmaalta. Ei julkaistu – ota yhteyttä lisätietoja varten."
