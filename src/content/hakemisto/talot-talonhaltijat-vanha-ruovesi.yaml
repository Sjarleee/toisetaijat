title: "Talonhaltijat – Vanhan Ruoveden tilojen isäntäluettelot (julkaisematon)"
description: "Laajat tutkimukset Vanhan Ruoveden alueen (Virrat, Ruovesi, Keuruu, Teisko, Multia) tilojen haltijoista noin vuodesta 1552 vuoteen 1809. Sisältää myös yksittäisiä tilahistorioita Parkanosta, Ilmajoelta ja Teiskosta."
reference:
  type: unpublished
  label: "Julkaisematon tilahistoriatutkimus"
  note: "Ota yhteyttä saadaksesi lisätietoja tästä aineistosta."
