title: "Katselmusrullat 1626–1720 – Suomen jalka- ja ratsuväki (julkaisematon)"
description: "Laajat transkriptiot ja muistiinpanot Ruotsin Sota-arkiston (KrA/SVAR) musterrullista vuosilta 1626–1720. Kattaa Suomen rykmenttien miehistöluettelot kotipitäjineen ja rusthollareineen. Pohja-aineisto useille julkaistuille teoksille."
