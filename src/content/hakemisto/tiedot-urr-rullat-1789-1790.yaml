title: "Uudenmaan ratsurykmentin katselmusrullat 1789–1790 (julkaisematon)"
description: "Yksityiskohtaiset transkriptiot Uudenmaan ratsurykmentin katselmusrullista vuosilta 1789–1790, sisältäen kaikki ratsumiesten nimet, rusthollarit, kotipitäjät sekä hevosten kuvaukset. Tämä on alkuperäinen lähdeaineisto; julkaistut PDF-artikkelit myydään erikseen."
reference:
  type: unpublished
  label: "Julkaisematon transkriptio (1789–1790)"
  note: "Ota yhteyttä – julkaistut artikkeliversiot eri vuosilta saatavana erikseen."
